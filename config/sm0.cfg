# sm0.cfg — P0 comparison run: SM floor penalty disabled.
# Identical to baseline.cfg except sm_floor_penalty=0 and ga_generations=50
# (50 gens is enough to observe early feasibility behaviour).

# ---- mission / fixed operating point ----
v_cruise        = 15.0
target_mass_aux = 0.045

# ---- airfoil seeds ----
seed_airfoils_dir = data/airfoils
seed_naca         = 0012,2412,4412,4421,4418
cst_bound_margin  = 0.04
cst_seed_jitter   = 0.25

# ---- payload / hardware ----
mass_motor      = 0.060
mass_battery    = 0.210
battery_len_m   = 0.070     # m, box length (chord-fit clamp + CG offset)
battery_width_m = 0.035     # m, box width  (report/CAD only)
battery_height_m = 0.015    # m, box height (report/CAD only)
mass_servo_each = 0.012
material_density = 1070
shell_thickness = 0.0012
infill_root     = 0.10
infill_tip      = 0.03

# ---- structural geometry ----
spar_diameter   = 0.006
spar_root_frac  = 0.15
spar_straight   = 0
spar_enable      = 1
n_ult            = 6.0
spar_sigma_allow = 150e6      # Pa, calibration knob — see baseline.cfg note
spar_density     = 1600       # kg/m^3, CF laminate equivalent
# te_thick_min_mm removed — all sections sharp
min_thickness_frac = 0.005
re_tip_min      = 100000

# ---- stability objective ----
sm_band_lo      = 0.06
sm_band_hi      = 0.08
sm_floor_penalty = 0       # <-- disabled for P0 comparison
thrust_z_offset = 0.020

# ---- hard gates ----
hinge_moment_max = 10
sweep_crossflow_deg = 25.0
crossflow_factor = 1.15
ncrit           = 4.0
confidence_threshold = 0.5

# ---- control & hardware ----
roll_helix_min         = 0.05
aileron_deflect_max_deg = 20.0
aileron_diff_ratio     = 4.0
adverse_yaw_penalty = 50.0
dynamic_stab_penalty = 5
dutch_roll_zeta_min  = 0.05
phugoid_zeta_min     = 0.0
spiral_t2_min        = 20.0
cn_beta_scale        = 1.0
cn_r_scale           = 1.0
motor_diameter   = 0.028
avionics_half_h  = 0.012

# ---- viscous engine ----
viscous_backend   = neuralfoil
neuralfoil_dir    = data/Neurafoilbin

# ---- external validation tools ----
avl_exe           = tools/bin/avl352.exe

# ---- GA / NSGA-II ----
ga_pop          = 120
ga_generations  = 50       # short run — just need gen 0/10/20/30/40/50 feasibility
ga_seed         = 1
ga_eta_cx       = 15.0
ga_eta_mut      = 20.0
ga_pcx          = 0.9
ga_pmut         = -1.0
n_stations      = 20

# ---- aerodynamics ----
aero_model      = panel
panel_chordwise = 10
high_alpha_deg  = 12
# te_thick_tip_frac removed — TE always sharp from decode
panel_relaxed_wake = 0
panel_wake_relax_steps = 3
