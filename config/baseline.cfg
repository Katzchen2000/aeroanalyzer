# AeroAnalyzer Pro — baseline configuration.
# Format: key = value, '#' starts a comment. Edit & re-run; no recompile needed.

# ---- mission / fixed operating point ----
v_cruise        = 15.0      # m/s (plan §3)
target_mass_aux = 0.045     # avionics block, kg (plan §4)

# ---- airfoil seeds (ancestry injection, plan §3) ----
seed_airfoils_dir = data/airfoils   # drop *.dat files here (Selig or Lednicer)
seed_naca         = 0012,2412,4412,4421,4418 # generated NACA 4-digit seeds
cst_bound_margin  = 0.04            # CST gene morph room widened around seeds
cst_seed_jitter   = 0.25            # spread hybrids' CST around seeds (frac of gene range; 0 = exact seed shape)

# ---- payload / hardware (plan §2, §4) ----
mass_motor      = 0.060     # kg, at Y=0 trailing edge keep-out
mass_battery    = 0.210     # kg, X-shiftable (forward CG ballast)
battery_len_m   = 0.070     # m, box length (sets chord-fit clamp + CG offset)
battery_width_m = 0.035     # m, box width  (report/CAD only)
battery_height_m = 0.015    # m, box height (report/CAD only)
mass_servo_each = 0.012     # kg
material_density = 1070     # ASA, kg/m^3 (shell + infill solid-equivalent)
shell_thickness = 0.0012    # m (wall)
infill_root     = 0.10      # infill fraction at root (plan §4)
infill_tip      = 0.03      # infill fraction at tip

# ---- structural geometry ----
spar_diameter   = 0.000     # m, 0 = disabled (CF spar constraint off for now)
spar_root_frac  = 0.15      # anchored at 15% chord
# 0 = spar follows the swept 15%-local-chord line (buildable default).
# 1 = literal straight spanwise tube; note it breaches the OML on swept wings,
#     which makes every swept candidate infeasible (surfaced during testing).
spar_straight   = 0
# te_thick_min_mm removed — all sections sharp (te_thick=0 from decode)
min_thickness_frac = 0.005  # interior min thickness, frac chord; gates figure-8 sections (constraint 12)
re_tip_min      = 60000     # Reynolds floor at tip; lowered to allow tapered winglet tips

# ---- stability objective (SM treated as an objective, target band) ----
sm_band_lo      = 0.06      # 6% MAC
sm_band_hi      = 0.08      # 8% MAC
sm_floor_penalty = 5        # light cv floor; SM objective handles the rest (was 30, caused planform collapse)
thrust_z_offset = 0.020     # m, thrust line above CG (plan §7)

# ---- hard gates (plan §7) ----
hinge_moment_max = 3      # kg-cm, fatal above
sweep_crossflow_deg = 25.0  # leading-edge sweep crossflow threshold (plan §6)
crossflow_factor = 1.15     # outer-span profile-drag multiplier
ncrit           = 4.0       # surrogate Ncrit for printed layer lines (plan §6)
confidence_threshold = 0.5  # soft cv gate for NeuralFoil/table low-confidence polars

# ---- control & hardware (M6) ----
# Roll authority: steady helix pb/2V at maximum 4:1 differential deflection.
# 0.05 is a practical RC flying-wing floor; reduce to 0 to disable the gate.
roll_helix_min         = 0.05   # steady pb/2V floor (dimensionless)
aileron_deflect_max_deg = 20.0  # max aileron throw, deg
aileron_diff_ratio     = 4.0    # up/down differential ratio (reduces adverse yaw)
adverse_yaw_penalty = 50.0   # cv weight for positive Cn_da (0 disables)
# Dynamic stability (Dutch-roll + phugoid, Roadmap #2).
# dynamic_stab_penalty = 0 means metrics are computed and logged in pareto.csv
# but do NOT affect the cv gate (report-only). Set >0 to enforce damping floors.
dynamic_stab_penalty = 0      # cv gate weight; 0 = report-only
dutch_roll_zeta_min  = 0.0    # minimum Dutch-roll damping ratio (gate when >0)
phugoid_zeta_min     = 0.0    # minimum phugoid damping ratio (gate when >0)
cn_beta_scale        = 1.0    # strip-theory calibration for Cn_beta
cn_r_scale           = 1.0    # strip-theory calibration for Cn_r
# Hardware keep-out: motor and avionics must physically fit in the section.
motor_diameter   = 0.028  # m, outrunner motor can diameter (sets keep-out radius)
avionics_half_h  = 0.012  # m, avionics block half-height (vertical, at 35% span)

# ---- pusher propeller keep-out (new, M8) ----
# Disk centered at root TE + prop_hub_gap, radius prop_diameter/2.
# Wing TE must stay prop_blade_clear forward of the disk face.
prop_diameter    = 0.203  # m — 8-inch prop
prop_hub_gap     = 0.010  # m — distance from root TE to prop face
prop_blade_clear = 0.005  # m — blade-tip safety margin

# ---- winglet CDi correction (non-planar Prandtl-Munk heuristic) ----
winglet_eff_factor   = 0.45   # k_wl: b_eff = b + k_wl*2*h_winglet
# ponytail: fixed builder taper, not a gene; promote to G_WINGLET_TAPER if worth optimizing
winglet_taper        = 0.5    # chord scale at winglet tip (1=untapered, 0.5=half chord at fold)
winglet_blend        = 0.06   # smoothstep band width for fold, fraction of span
chord_min_winglet_m  = 0.015  # 15 mm floor for winglet stations (vs 30 mm for main wing)

# ---- viscous engine (runtime; selects how section drag/moment are evaluated) ----
# neuralfoil : in-process NeuralFoil nn-large neural net (default). Continuous,
#              C-infinity smooth, GPL-free; needs the weight .bin files below.
#              Obsoletes the offline XFOIL polar table for runtime queries.
# table      : legacy offline XFOIL polar CSV (data/surrogates) + IDW interp.
# analytic   : closed-form stand-in (no data files).
viscous_backend   = neuralfoil          # neuralfoil | table | analytic
neuralfoil_dir    = data/Neurafoilbin   # NeuralFoil nn-large weight .bin files

# ---- external validation tools (run from project root) ----
avl_exe           = tools/bin/avl352.exe  # AVL cross-check oracle (validate_avl.ps1)

# ---- GA / NSGA-II ----
ga_pop          = 120
ga_generations  = 170
ga_seed         = 1
ga_eta_cx       = 10.0      # SBX distribution index (was 15; lower = wider crossover, more exploration)
ga_eta_mut      = 10.0      # polynomial-mutation distribution index (was 20; lower = wider mutations)
ga_pcx          = 0.9       # crossover probability
# mutation probability defaults to 1/n_genes if <0
ga_pmut         = -1.0
n_stations      = 20        # spanwise stations (plan §3)

# 3-D aerodynamics model (Milestone 3). "panel" = Morino constant-strength
# doublet/source panel solver (default model of record, AVL-validated). "vlm" =
# the analytic vortex-lattice fallback. panel_chordwise = chordwise panels/side.
aero_model      = panel
panel_chordwise = 10
# Alpha at which the high-alpha capped solve evaluates NP migration and tip-stall
# (Milestone 5). Increase for higher stall margins; 12 deg covers typical flying-wing
# stall onset. Inert when aero_model = vlm.
high_alpha_deg  = 12

# te_thick_tip_frac removed — TE is always sharp; motor pocket via CAD plane-split
# Relaxed-wake pass: re-aligns the trailing wake with the local downwash for
# exact induced drag. Off in the GA (frozen wake is within a fraction of a % and
# far cheaper); the reporting re-evaluation of the incumbents turns it on.
panel_relaxed_wake = 0
panel_wake_relax_steps = 3
#
# Roll authority + adverse-yaw gates use code defaults (roll_helix_min=0.05,
# adverse_yaw_penalty=50.0). Override here to retune or to disable for debugging.
