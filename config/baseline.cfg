# AeroAnalyzer Pro — baseline configuration.
# Format: key = value, '#' starts a comment. Edit & re-run; no recompile needed.

# ---- mission / fixed operating point ----
v_cruise        = 15.0      # m/s (plan §3)
target_mass_aux = 0.045     # avionics block, kg (plan §4)

# ---- airfoil seeds (ancestry injection, plan §3) ----
seed_airfoils_dir = data/airfoils   # drop *.dat files here (Selig or Lednicer)
seed_naca         = 0012,2412,4412  # generated NACA 4-digit seeds
cst_bound_margin  = 0.04            # CST gene morph room widened around seeds

# ---- payload / hardware (plan §2, §4) ----
mass_motor      = 0.060     # kg, at Y=0 trailing edge keep-out
mass_battery    = 0.210     # kg, 70x35x15mm box, X-shiftable
mass_servo_each = 0.012     # kg
material_density = 1070     # ASA, kg/m^3 (shell + infill solid-equivalent)
shell_thickness = 0.0012    # m (wall)
infill_root     = 0.10      # infill fraction at root (plan §4)
infill_tip      = 0.03      # infill fraction at tip

# ---- structural geometry ----
spar_diameter   = 0.006     # m, spar cylinder (plan §4)
spar_root_frac  = 0.15      # anchored at 15% chord
# 0 = spar follows the swept 15%-local-chord line (buildable default).
# 1 = literal straight spanwise tube; note it breaches the OML on swept wings,
#     which makes every swept candidate infeasible (surfaced during testing).
spar_straight   = 0
te_thick_min_mm = 0.8       # trailing-edge clamp, mm (plan §3)
re_tip_min      = 100000    # Reynolds floor at tip (plan §3)

# ---- stability objective (SM treated as an objective, target band) ----
sm_band_lo      = 0.06      # 6% MAC
sm_band_hi      = 0.08      # 8% MAC
sm_floor_penalty = 30       # hard cv gate forcing SM >= sm_band_lo (0 = soft objective only)
thrust_z_offset = 0.020     # m, thrust line above CG (plan §7)

# ---- hard gates (plan §7) ----
hinge_moment_max = 1.2      # kg-cm, fatal above
sweep_crossflow_deg = 25.0  # leading-edge sweep crossflow threshold (plan §6)
crossflow_factor = 1.15     # outer-span profile-drag multiplier
ncrit           = 4.0       # surrogate Ncrit for printed layer lines (plan §6)

# ---- control & hardware (M6) ----
# Roll authority: steady helix pb/2V at maximum 4:1 differential deflection.
# 0.05 is a practical RC flying-wing floor; reduce to 0 to disable the gate.
roll_helix_min         = 0.05   # steady pb/2V floor (dimensionless)
aileron_deflect_max_deg = 20.0  # max aileron throw, deg
aileron_diff_ratio     = 4.0    # up/down differential ratio (reduces adverse yaw)
# Hardware keep-out: motor and avionics must physically fit in the section.
motor_diameter   = 0.028  # m, outrunner motor can diameter (sets keep-out radius)
avionics_half_h  = 0.012  # m, avionics block half-height (vertical, at 35% span)

# ---- viscous engine (runtime; selects how section drag/moment are evaluated) ----
# neuralfoil : in-process NeuralFoil nn-large neural net (default). Continuous,
#              C-infinity smooth, GPL-free; needs the weight .bin files below.
#              Obsoletes the offline XFOIL polar table for runtime queries.
# table      : legacy offline XFOIL polar CSV (data/surrogates) + IDW interp.
# analytic   : closed-form stand-in (no data files).
viscous_backend   = neuralfoil          # neuralfoil | table | analytic
neuralfoil_dir    = data/Neurafoilbin   # NeuralFoil nn-large weight .bin files

# ---- external validation tools (run from project root) ----
avl_exe           = tools/bin/avl352.exe  # AVL cross-check oracle (manual for now)

# ---- GA / NSGA-II ----
ga_pop          = 120
ga_generations  = 150
ga_seed         = 1
ga_eta_cx       = 15.0      # SBX distribution index
ga_eta_mut      = 20.0      # polynomial-mutation distribution index
ga_pcx          = 0.9       # crossover probability
# mutation probability defaults to 1/n_genes if <0
ga_pmut         = -1.0
n_stations      = 20        # spanwise stations (plan §3)

# 3-D aerodynamics model (Milestone 3). "panel" = Morino constant-strength
# doublet/source panel solver (default model of record, AVL-validated). "vlm" =
# the analytic vortex-lattice fallback. panel_chordwise = chordwise panels/side.
aero_model      = panel
panel_chordwise = 10
# Alpha at which the high-alpha capped solve evaluates NP migration and tip-stall
# (Milestone 5). Increase for higher stall margins; 12 deg covers typical flying-wing
# stall onset. Inert when aero_model = vlm.
high_alpha_deg  = 12
